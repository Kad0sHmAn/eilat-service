<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח רעיונות - תצוגת זכוכית מרחפת</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        h1 {
            color: #0f172a; 
            font-size: 2.5em; 
            text-align: center; 
            margin-top: 30px;
            position: relative; 
            z-index: 10; 
            pointer-events: none;
        }

        /* עיצוב בועות הזכוכית */
        .bubble {
            width: 320px; 
            height: 320px; 
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 30px; 
            box-sizing: border-box; 
            text-align: center;
            position: absolute; 
            top: 0; 
            left: 0; 
            transition: opacity 0.8s; 
            will-change: transform;
        }

        /* התאמה חכמה לטלפונים ניידים */
        @media (max-width: 768px) {
            .bubble { width: 180px; height: 180px; padding: 15px; }
            .bubble-tags { display: none; }
            h1 { font-size: 1.5em; margin-top: 20px;}
        }

        .bubble-tags { 
            font-size: 0.85em; 
            color: #0284c7; 
            font-weight: 700; 
            margin-bottom: 10px; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            padding-bottom: 5px; 
        }

        .bubble-solution { 
            font-size: 1.1em; 
            color: #1e293b; 
            line-height: 1.4; 
        }

        .fade-out { 
            opacity: 0 !important; 
        }
    </style>
</head>
<body>
    <h1>💡 קיר הרעיונות 2035</h1>
    
    <div id="bubblesContainer">
        <div class="bubble" id="bubble1"><div id="content1"></div></div>
        <div class="bubble" id="bubble2"><div id="content2"></div></div>
        <div class="bubble" id="bubble3"><div id="content3"></div></div>
        <div class="bubble" id="bubble4"><div id="content4"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // חיבור למסד הנתונים שלך ב-Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAcVlqfO_v4HGj7KC8-wPyC7EgWOmuyJ7A",
            authDomain: "eilat-service-2035.firebaseapp.com",
            projectId: "eilat-service-2035",
            storageBucket: "eilat-service-2035.firebasestorage.app",
            messagingSenderId: "12177419107",
            appId: "1:12177419107:web:70e353e46294af5ef30156"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allIdeas = [];
        
        // הגדרת המיקום והמהירות הראשונית של הכדורים
        const bubblesData = Array.from({ length: 4 }, () => ({
            x: Math.random() * (window.innerWidth - 320),
            y: Math.random() * (window.innerHeight - 320),
            vx: (Math.random() * 0.6) + 0.4, 
            vy: (Math.random() * 0.6) + 0.4
        }));

        // מנוע הפיזיקה של הכדורים
        function animate() {
            const size = window.innerWidth <= 768 ? 180 : 320;
            const maxX = window.innerWidth - size;
            const maxY = window.innerHeight - size;

            for (let i = 1; i <= 4; i++) {
                const b = document.getElementById(`bubble${i}`);
                if (!b) continue;

                const d = bubblesData[i-1];
                d.x += d.vx; 
                d.y += d.vy;

                // קפיצה מהקירות והפיכת כיוון
                if (d.x <= 0 || d.x >= maxX) d.vx *= -1;
                if (d.y <= 0 || d.y >= maxY) d.vy *= -1;

                // שומר שהכדור לא יברח החוצה אם מקטינים את החלון
                if (d.x < 0) d.x = 0;
                if (d.y < 0) d.y = 0;
                if (d.x > maxX) d.x = maxX;
                if (d.y > maxY) d.y = maxY;

                b.style.transform = `translate(${d.x}px, ${d.y}px)`;
            }
            requestAnimationFrame(animate);
        }
        animate();

        // משיכת הרעיונות מ-Firebase
        async function fetchIdeas() {
            try {
                const snap = await getDocs(collection(db, "solutions"));
                allIdeas = []; 
                snap.forEach(d => allIdeas.push(d.data()));
                if (allIdeas.length > 0) updateBubbles();
            } catch (error) {
                console.error("שגיאה במשיכת הנתונים:", error);
            }
        }

        // עדכון התוכן בתוך הכדורים
        function updateBubbles() {
            if (allIdeas.length === 0) return;
            
            // ערבוב הרעיונות
            const items = [...allIdeas].sort(() => 0.5 - Math.random());
            
            // אם יש פחות מ-4 רעיונות במסד, נשכפל אותם כדי שהכדורים לא יישארו ריקים
            while(items.length < 4) {
                items.push(items[Math.floor(Math.random() * items.length)]);
            }
            
            for (let i = 1; i <= 4; i++) {
                const b = document.getElementById(`bubble${i}`);
                const c = document.getElementById(`content${i}`);
                const item = items[i-1];
                
                b.classList.add('fade-out');
                
                setTimeout(() => {
                    c.innerHTML = `
                        <div class="bubble-tags">👤 ${item.persona}<br>🏙️ ${item.scenario}</div>
                        <div class="bubble-solution">${item.solution}</div>
                    `;
                    b.classList.remove('fade-out');
                }, 500);
            }
        }
        
        // קריאה ראשונית לנתונים ורענון כל דקה (60000 מילישניות)
        fetchIdeas(); 
        setInterval(fetchIdeas, 60000);
    </script>
</body>
</html>
