<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>תושבים מעצבים חווית שירות 2035</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #113344;
      --blue: #27336F;
      --turquoise-light: #81C6DD;
      --turquoise: #14B8D4;
      --coral: #BB801C;
      --yellow: #FAC220;
      --bg: #E4F4F9;
      --gray-blue: #4D6475;
      --gray-dark: #37464B;
      --white: #ffffff;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(17,51,68,0.12);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Heebo', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }

    .screen { display: none; flex-direction: column; min-height: 100vh; }
    .screen.active { display: flex; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .app-header {
      background: var(--navy);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 15px rgba(0,0,0,0.25);
    }
    .app-header .subtitle { font-size: 12px; color: var(--turquoise-light); margin-top: 1px; }
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .back-btn:active { background: rgba(255,255,255,0.3); }

    .progress-bar {
      background: var(--navy);
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .progress-step {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      transition: background 0.3s;
    }
    .progress-step.done { background: var(--turquoise); }
    .progress-step.active { background: var(--yellow); }

    #screen-welcome {
      background: linear-gradient(160deg, var(--navy) 0%, var(--blue) 80%, #113344 100%);
      color: white;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 30px;
    }
    .welcome-logo {
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      border: 2px solid var(--turquoise-light);
      box-shadow: 0 0 30px rgba(20, 184, 212, 0.2);
    }
    .welcome-year {
      background: var(--turquoise);
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
      padding: 5px 18px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .welcome-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
    .welcome-desc { font-size: 15px; color: var(--turquoise-light); line-height: 1.6; margin-bottom: 40px; max-width: 320px; }
    
    .welcome-steps { display: flex; gap: 12px; margin-bottom: 40px; width: 100%; max-width: 360px; }
    .welcome-step { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(129,198,221,0.2); border-radius: var(--radius); padding: 15px 5px; }
    .welcome-step .step-num { width: 30px; height: 30px; background: var(--turquoise); color: var(--navy); border-radius: 50%; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
    .welcome-step .step-text { font-size: 12px; color: var(--turquoise-light); font-weight: 600;}
    
    .btn-primary { 
        background: var(--turquoise); 
        color: var(--navy); 
        border: none; 
        padding: 16px 48px; 
        border-radius: 30px; 
        font-size: 18px; 
        font-weight: 800; 
        cursor: pointer; 
        box-shadow: 0 6px 20px rgba(20,184,212,0.4); 
    }

    .grid-container { flex: 1; padding: 20px 16px; overflow-y: auto; padding-bottom: 40px; }
    .grid-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .grid-subtitle { font-size: 13px; color: var(--gray-blue); margin-bottom: 16px; }
    
    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; display: flex; flex-direction: column; }
    .card.selected { border-color: var(--coral); }
    .card-img-wrapper { aspect-ratio: 3/4; overflow: hidden; background: var(--white); }
    #scenario-grid .card-img-wrapper { aspect-ratio: 4/3; }
    .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .card-label { padding: 8px 4px; font-size: 12px; font-weight: 800; text-align: center; }
    .card-subtitle { color: var(--gray-blue); font-size: 10px; display: block; }

    .detail-container { flex: 1; overflow-y: auto; padding-bottom: 120px; }
    .detail-hero { position: relative; height: 220px; }
    .detail-hero-img { width: 100%; height: 100%; object-fit: cover; }
    .detail-hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(17,51,68,0.95)); padding: 20px; text-align: right; }
    .detail-hero-name { color: white; font-size: 26px; font-weight: 800; }
    .detail-hero-sub { color: var(--turquoise-light); font-size: 15px; }
    .detail-body { padding: 20px; }
    .detail-section { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .detail-section-label { font-size: 12px; font-weight: 800; color: var(--blue); margin-bottom: 5px; }
    .detail-quote { background: linear-gradient(135deg, var(--navy), var(--blue)); border-radius: var(--radius); padding: 20px; color: white; font-style: italic; margin-bottom: 10px; }

    .detail-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: white; z-index: 50; }
    .input-container { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 120px; }
    .idea-textarea { width: 100%; min-height: 150px; padding: 15px; border-radius: var(--radius); border: 2px solid white; box-shadow: var(--shadow); font-family: inherit; font-size: 16px; }
    
    .submit-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: white; }
    .btn-submit { width: 100%; background: var(--blue); color: white; padding: 16px; border-radius: var(--radius); font-weight: 800; border: none; font-size: 18px; }

    .toast { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #e53e3e; color: white; padding: 15px; border-radius: 12px; text-align: center; opacity: 0; transition: 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAcVlqfO_v4HGj7KC8-wPyC7EgWOmuyJ7A",
        authDomain: "eilat-service-2035.firebaseapp.com",
        projectId: "eilat-service-2035",
        storageBucket: "eilat-service-2035.firebasestorage.app",
        messagingSenderId: "12177419107",
        appId: "1:12177419107:web:70e353e46294af5ef30156"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.collection = collection;
    window.addDoc = addDoc;
    window.serverTimestamp = serverTimestamp;
  </script>
</head>
<body>

<div id="screen-welcome" class="screen active">
  <div class="welcome-logo">🏛️</div>
  <div class="welcome-year">2035</div>
  <div class="welcome-title">תושבים מעצבים<br>חווית שירות</div>
  <div class="welcome-desc">בחרו פרסונה ותרחיש, ושתפו את הרעיון שלכם לעתיד קומת השירות בעיר</div>
  <button class="btn-primary" onclick="goTo('selectPersona')">מתחילים ←</button>
</div>

<div id="screen-selectPersona" class="screen">
  <div class="app-header">
    <div style="color:white; font-weight:800;">שלב 1 מתוך 3</div>
    <button class="back-btn" onclick="goTo('welcome')">חזרה</button>
  </div>
  <div class="grid-container">
    <div class="grid-title">מיהו/מיהי המשתמש/ת?</div>
    <div id="persona-grid" class="card-grid"></div>
  </div>
</div>

<div id="screen-personaDetail" class="screen">
  <div class="app-header">
    <div style="color:white; font-weight:800;">הפרסונה שנבחרה</div>
    <button class="back-btn" onclick="goTo('selectPersona')">חזרה</button>
  </div>
  <div class="detail-container" id="persona-detail-content"></div>
  <div class="detail-footer">
    <button class="btn-full" onclick="goTo('selectScenario')">ממשיכים לתרחיש ←</button>
  </div>
</div>

<div id="screen-selectScenario" class="screen">
  <div class="app-header">
    <div style="color:white; font-weight:800;">שלב 2 מתוך 3</div>
    <button class="back-btn" onclick="goTo('personaDetail')">חזרה</button>
  </div>
  <div class="grid-container">
    <div class="grid-title">מה התרחיש?</div>
    <div id="scenario-grid" class="card-grid"></div>
  </div>
</div>

<div id="screen-scenarioDetail" class="screen">
  <div class="app-header">
    <div style="color:white; font-weight:800;">התרחיש שנבחר</div>
    <button class="back-btn" onclick="goTo('selectScenario')">חזרה</button>
  </div>
  <div class="detail-container" id="scenario-detail-content"></div>
  <div class="detail-footer">
    <button class="btn-full" onclick="goTo('input')">מה הרעיון שלי? ←</button>
  </div>
</div>

<div id="screen-input" class="screen">
  <div class="app-header">
    <div style="color:white; font-weight:800;">שלב 3 מתוך 3</div>
    <button class="back-btn" onclick="goTo('scenarioDetail')">חזרה</button>
  </div>
  <div class="input-container">
    <div class="grid-title">איזה שירות הייתם מציעים?</div>
    <textarea id="idea-text" class="idea-textarea" placeholder="כתבו כאן את הרעיון שלכם..."></textarea>
    <div class="name-field" style="margin-top:20px;">
        <input type="text" id="submitter-name" class="name-input" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc;" placeholder="השם שלכם (אופציונלי)">
    </div>
  </div>
  <div class="submit-footer">
    <button class="btn-submit" onclick="submitIdea()">שלחו את הרעיון 🚀</button>
  </div>
</div>

<div id="screen-submitting" class="screen" style="justify-content:center; align-items:center;">
    <div class="spinner"></div>
    <div style="margin-top:20px; font-weight:800;">שולח...</div>
</div>

<div id="screen-success" class="screen" style="justify-content:center; align-items:center; text-align:center;">
    <div style="font-size:60px;">✅</div>
    <h2 style="color:white;">תודה רבה!</h2>
    <p style="color:var(--turquoise-light);">הרעיון שלכם נשלח בהצלחה.</p>
    <button class="btn-primary" style="margin-top:30px;" onclick="location.reload()">התחילו מחדש</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PERSONAS = [
  { id:1, name:'ליאת', sub:'האמא', need:'סביבה שקטה, קרירה ומרגיעה שמורידה מיד את הלחץ, שילוט והכוונה ברורים שנותנים לה תחושת ביטחון והתמצאות ומונעים בלבול', quote:'"אני חייבת לדעת מראש לאן בדיוק להגיע מהרגע הראשון"', img:'DATA/persona1.jpg', detailImg:'DATA/persona1_detail.jpg', desc:'ליאת מגיעה לבניין העירייה אחרי הליכה מתישה בשיא החום של אילת, כשהיא דוחפת עגלה ומנסה להרגיע תינוק שבוכה ללא הפסקה. היא עמוסה, מוסחת דעת והדבר האחרון שיש לה סבלנות אליו כרגע, הוא להתחיל לחפש את הדרך. היא חייבת לדעת בדיוק לאן ללכת מהשנייה שהיא נכנסת, כדי לסיים את הסידור כמה שיותר מהר מבלי להתעכב.' },
  { id:2, name:'דן', sub:'היזם', need:'התנהלות יעילה ומהירה, וחלל שמרגיש ומתפקד כמו טרקלין עסקים נוח המאפשר לו לפתוח מחשב נייד ולעבוד ללא הפרעות', quote:'"חייב לנצל את זמן ההמתנה לטובת זמן עבודה"', img:'DATA/persona2.jpg', detailImg:'DATA/persona2_detail.jpg', desc:'דן מנהל עסק פעיל באילת ועבורו כל דקה שווה כסף. כשהוא מגיע לעירייה, כל שנייה של המתנה בתור נתפסת מבחינתו כזמן מבוזבז שפוגע בעסק שלו. הוא לחוץ להמשיך לעבוד, לנהל שיחות טלפון ולשלוח מיילים גם כשהוא נמצא פיזית בתוך המבנה כדי לא לעכב תהליכים.' },
  { id:3, name:'אתי', sub:'בעלת עסק', need:'מסלול מהיר ומיוחד לבעלי עסקים, טיפול קצר, יעיל וממוקד, והבנה מצד המערכת שהזמן של בעלי העסקים הוא יקר ומהווה מנוע כלכלי חשוב לעיר', quote:'"העונה מתחילה, אין לי זמן מיותר לבזבז על אישורים"', img:'DATA/persona3.jpg', detailImg:'DATA/persona3_detail.jpg', desc:'כלכלת העסק של אתי נשענת על עונות התיירות התוססות באילת. היא מגיעה לבניין העירייה בלחץ לפני פתיחת העונה, בידיעה שכל עיכוב בירוקרטי בקבלת אישורים או רישיונות פוגע לה ישירות בפרנסה. היא לא יכולה להרשות לעצמה להתעכב ולהפסיד לקוחות.' },
  { id:4, name:'רועי', sub:'הסטודנט', need:'מענה אוטומטי, זריז ומותאם לו אישית שחוסך זמן יקר ומונע את הצורך במפגש אנושי עבור פעולות טכניות', quote:'"שהמערכת תבדוק לי בשנייה אם אני זכאי למלגה"', img:'DATA/persona4.jpg', detailImg:'DATA/persona4_detail.jpg', desc:'רועי לומד בקמפוס בעיר ועובד בעבודת מלצרות בכדי לממן את עצמו. הזמן שלו קצוב ומחושב. רועי חי בעולם מהיר ומצפה שהשירות בעירייה יעמוד בקצב שלו, הוא מחפש לשלוף את המידע שהוא צריך באותו רגע דרך הנייד, בלי למלא טפסים מיותרים או להמתין לפקיד שיתפנה.' },
  { id:5, name:'דוד', sub:'הגמלאי', need:'יחס אישי, חם ומכבד, שירות פשוט של פעם שאינו תלוי במחשבים, וסביבה שמקנה לו תחושת ביטחון ופרטיות לשוחח בנחת', quote:'"אני רוצה לדבר עם בן אדם, לא עם מסך"', img:'DATA/persona5.jpg', detailImg:'DATA/persona5_detail.jpg', desc:'דוד שייך לדור הוותיק ולא מסתדר עם המסכים והמערכות המתקדמות. הוא מרגיש חסר אונים ואבוד כשהוא נדרש להשתמש בעמדות השירות החכמות בשירות עצמי. הטכנולוגיה מרתיעה אותו, והוא פשוט מחפש לראות פנים מוכרות של אדם שיישב מולו, יקשיב לבעיה שלו ויעזור לו למלא את הטפסים.' },
  { id:6, name:'אבי', sub:'תושב העיר', need:'סביבה שקופה והוגנת ואווירה שמרגיעה מתחים, מורידה את מפלס הלחץ ומעניקה יחס שמשדר: "אנחנו רואים אותך ואכפת לנו ממך", תחושה שהעניינים שלו מטופלים ברצינות ולא כפי שחשב כשנכנס לבניין העירייה.', quote:'"נמאס לי מסחבת, הכל מרגיש כל כך איטי"', img:'DATA/persona6.jpg', detailImg:'DATA/persona6_detail.jpg', desc:'אבי מגיע לבית העירייה כבר חסר סבלנות. עוד לפני שנכנס, הוא חושש להיתקע בסבך של בירוקרטיה ארוכה ומתישה. יש בו תחושה שמערכת ממסדית גדולה לא באמת רואה את האדם שמולה, והוא לא רוצה להפוך לעוד בורג קטן במכונה עירונית מנוכרת. לכן כבר מראש, הוא דרוך, כמעט מתגונן ומצפה לקושי ולעיכובים בשירות.' },

  { id:18, name:'משוב דרך צבע ומפת רגש עירונית', img:'DATA/scenario18.jpg', desc:'בסיום השירות התושב בוחר אובייקט בצבע שמייצג את תחושתו ומניח אותו במיצג משותף. לאורך היום נוצרת מפת רגש חיה המשתנה בזמן אמת ומשקפת את חוויית השירות שקיבל. המידע נאסף ומונגש לצוותים באופן שמאפשר למידה, התאמה ושיפור מתמשך.' }
];

let state = {
  persona: null,
  scenario: null,
  inputMode: 'text'
};

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);

  if (screen === 'selectPersona') renderPersonaGrid();
  if (screen === 'personaDetail') renderDetail('persona');
  if (screen === 'selectScenario') renderScenarioGrid();
  if (screen === 'scenarioDetail') renderDetail('scenario');
}

function renderPersonaGrid() {
  const grid = document.getElementById('persona-grid');
  grid.innerHTML = PERSONAS.map(p => `
    <div class="card" onclick="selectPersona(${p.id})">
      <div class="card-img-wrapper"><img src="${p.img}" alt="${p.name}"></div>
      <div class="card-label">${p.name}<br><span class="card-subtitle">${p.sub}</span></div>
    </div>
  `).join('');
}

function renderScenarioGrid() {
  const grid = document.getElementById('scenario-grid');
  grid.innerHTML = SCENARIOS.map(s => `
    <div class="card" onclick="selectScenario(${s.id})">
      <div class="card-img-wrapper"><img src="${s.img}" alt="${s.name}"></div>
      <div class="card-label">${s.name}</div>
    </div>
  `).join('');
}

function selectPersona(id) {
  state.persona = PERSONAS.find(p => p.id === id);
  goTo('personaDetail');
}

function selectScenario(id) {
  state.scenario = SCENARIOS.find(s => s.id === id);
  goTo('scenarioDetail');
}

function renderDetail(type) {
  const item = type === 'persona' ? state.persona : state.scenario;
  const isPersona = type === 'persona';
  
  const html = `
    <div class="detail-hero">
      <img class="detail-hero-img" src="${isPersona ? (item.detailImg || item.img) : item.img}">
      <div class="detail-hero-overlay">
        <div class="detail-hero-name">${item.name}</div>
        <div class="detail-hero-sub">${isPersona ? item.sub : 'תרחיש'}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-label">${isPersona ? 'הסיפור' : 'התרחיש'}</div>
        <div style="font-size:14px;">${item.desc}</div>
      </div>
      ${isPersona ? `
      <div class="detail-section">
        <div class="detail-section-label">הצורך המרכזי</div>
        <div style="font-size:14px;">${item.need}</div>
      </div>
      <div class="detail-quote">${item.quote}</div>` : ''}
    </div>
  `;
  document.getElementById(type + '-detail-content').innerHTML = html;
}

async function submitIdea() {
  const text = document.getElementById('idea-text').value.trim();
  const name = document.getElementById('submitter-name').value.trim();

  if (!text) {
    showToast('נא להזין רעיון לפני השליחה');
    return;
  }

  goTo('submitting');

  try {
    await window.addDoc(window.collection(window.db, "solutions"), {
      persona: state.persona.name + ' - ' + state.persona.sub,
      scenario: state.scenario.name,
      solution: text,
      submitterName: name,
      timestamp: window.serverTimestamp(),
      type: 'text'
    });
    goTo('success');
  } catch (err) {
    console.error(err);
    showToast('שגיאה בשליחה. נסו שוב.');
    goTo('input');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
