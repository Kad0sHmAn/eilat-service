<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול ותוצרי סדנה - אילת 2035</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #f1f5f9; padding: 20px; color: #0f172a; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-weight: 800; margin-bottom: 10px; color: #113344;}
        .subtitle { text-align: center; color: #4D6475; margin-bottom: 30px; }
        
        .actions-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-pdf { background: #14B8D4; color: #113344; }
        .btn-pdf:hover { background: #0da3bc; }
        .btn-excel { background: #10b981; color: white; }
        .btn-excel:hover { background: #059669; }

        .stats-bar { background: white; padding: 15px; border-radius: 15px; margin-bottom: 30px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-weight: bold; }

        .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .idea-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; border: 1px solid #e2e8f0; height: auto; min-height: 200px; }
        .idea-header { font-weight: 700; font-size: 0.85em; color: #27336F; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
        .idea-content { font-size: 1.05em; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; color: #1e293b; }
        .idea-img { width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; object-fit: contain; max-height: 500px; }
        
        .audio-player { width: 100%; margin-top: 15px; height: 40px; border-radius: 20px;}

        @media print {
            .actions-bar, .stats-bar { display: none; }
            body { background: white; padding: 0; }
            .ideas-grid { display: block; }
            .idea-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; margin-bottom: 20px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 מרכז ניהול נתונים: אילת 2035</h1>
        <p class="subtitle">ריכוז כל הרעיונות, הפתרונות, הפתקיות וההקלטות מהסדנה</p>
        
        <div class="actions-bar">
            <button class="btn btn-pdf" onclick="window.print()">📑 שמור סיכום כ-PDF</button>
            <button class="btn btn-excel" id="downloadExcel">📗 הורד קובץ Excel</button>
        </div>

        <div class="stats-bar" id="stats">טוען נתונים מהענן...</div>
        <div class="ideas-grid" id="ideasGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcVlqfO_v4HGj7KC8-wPyC7EgWOmuyJ7A",
            authDomain: "eilat-service-2035.firebaseapp.com",
            projectId: "eilat-service-2035",
            storageBucket: "eilat-service-2035.firebasestorage.app",
            messagingSenderId: "12177419107",
            appId: "1:12177419107:web:70e353e46294af5ef30156"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentData = [];

        async function loadData() {
            const grid = document.getElementById('ideasGrid');
            const stats = document.getElementById('stats');
            
            try {
                const q = query(collection(db, "solutions"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = '';
                currentData = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    currentData.push(data);
                    
                    const card = document.createElement('div');
                    card.className = 'idea-card';
                    
                    let contentHTML = '';
                    if (data.type === 'image' && data.image) {
                        contentHTML = `<img src="${data.image}" class="idea-img" alt="פתקית שצולמה">`;
                    } else if (data.type === 'audio' && data.audio) {
                        contentHTML = `
                            <div class="idea-content" style="text-align:center; padding-top:10px;">
                                🎙️ <strong>הקלטה קולית מהמשתתף:</strong><br>
                                <audio controls class="audio-player">
                                    <source src="${data.audio}">
                                    הדפדפן שלך אינו תומך בנגן שמע.
                                </audio>
                            </div>`;
                    } else {
                        contentHTML = `<div class="idea-content">${data.solution || ''}</div>`;
                    }

                    card.innerHTML = `
                        <div class="idea-header">
                            👤 ${data.persona}<br>🏙️ ${data.scenario}
                        </div>
                        <div class="idea-body">
                            ${contentHTML}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                stats.innerText = `סה"כ נאספו ${currentData.length} תוצרים מהמשתתפים`;
            } catch (error) {
                console.error(error);
                stats.innerText = "שגיאה בתקשורת עם בסיס הנתונים.";
            }
        }

        document.getElementById('downloadExcel').onclick = () => {
            if (currentData.length === 0) return alert("אין נתונים להורדה");

            let csvContent = "\uFEFF"; 
            csvContent += "תאריך,שם שולח,פרסונה,תרחיש,סוג,תוכן\n";

            currentData.forEach(item => {
                const date = item.timestamp ? item.timestamp.toDate().toLocaleString('he-IL') : '';
                const submitter = item.submitterName || 'אנונימי';
                const persona = item.persona || '';
                const scenario = item.scenario || '';
                
                let type = 'טקסט';
                if (item.type === 'image') type = 'צילום פתקית';
                if (item.type === 'audio') type = 'הקלטה קולית';

                let content = (item.solution || '').replace(/"/g, '""').replace(/\n/g, ' ');
                if (item.type === 'image') content = 'תמונה (ניתן לראות במסך הניהול)';
                if (item.type === 'audio') content = 'קובץ שמע (ניתן לשמוע במסך הניהול)';
                
                csvContent += `"${date}","${submitter}","${persona}","${scenario}","${type}","${content}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Eilat_2035_Results_${new Date().toLocaleDateString('he-IL').replace(/\//g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        loadData();
    </script>
</body>
</html>
