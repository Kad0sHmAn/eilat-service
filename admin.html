<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול ותוצרי סדנה - אילת 2035</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* פלטת צבעי הליבה - אילת 2035 */
        :root {
            --navy: #113344;
            --blue: #27336F;
            --turquoise-light: #81C6DD;
            --turquoise: #14B8D4;
            --coral: #BB801C;
            --yellow: #FAC220;
            --bg: #E4F4F9;
            --gray-blue: #4D6475;
            --gray-dark: #37464B;
        }

        body { 
            font-family: 'Heebo', sans-serif; 
            background: var(--bg); /* רקע תכלת-אוויר */
            padding: 20px; 
            color: var(--navy); 
            margin: 0; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { 
            text-align: center; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: var(--navy); /* כחול נייבי עמוק */
        }
        
        .subtitle { 
            text-align: center; 
            color: var(--gray-blue); /* אפור-כחול מעושן */
            margin-bottom: 30px; 
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .actions-bar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }
        
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            box-shadow: 0 4px 10px rgba(17, 51, 68, 0.15); 
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }

        .btn-pdf { background: var(--turquoise); color: var(--navy); }
        .btn-pdf:hover { background: #0da3bc; }
        
        .btn-excel { background: var(--blue); color: white; }
        .btn-excel:hover { background: #1a2352; }
        
        .btn-audio { background: var(--coral); color: white; }
        .btn-audio:hover { background: #9e6c17; }

        .stats-bar { 
            background: white; 
            padding: 18px; 
            border-radius: 14px; 
            margin-bottom: 30px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(17, 51, 68, 0.08); 
            font-weight: 800; 
            font-size: 1.2em;
            color: var(--navy);
            border-right: 6px solid var(--turquoise);
        }

        .ideas-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }
        
        .idea-card { 
            background: white; 
            border-radius: 14px; 
            padding: 20px; 
            box-shadow: 0 5px 15px rgba(17, 51, 68, 0.08); 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(129, 198, 221, 0.4); /* מסגרת טורקיז בהיר עדינה */
            height: auto; 
            min-height: 200px; 
        }
        
        .idea-header { 
            font-weight: 800; 
            font-size: 0.9em; 
            color: var(--blue); /* כחול אילתי */
            border-bottom: 3px solid var(--yellow); /* פס הפרדה צהוב חם */
            padding-bottom: 12px; 
            margin-bottom: 15px; 
        }
        
        .idea-content { 
            font-size: 1.05em; 
            line-height: 1.6; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            color: var(--gray-dark); /* אפור כהה חם */
            font-weight: 600;
        }
        
        .idea-img { 
            width: 100%; 
            border-radius: 8px; 
            margin-top: 15px; 
            border: 2px solid var(--bg); 
            object-fit: contain; 
            max-height: 500px; 
        }
        
        .audio-player { 
            width: 100%; 
            margin-top: 15px; 
            height: 40px; 
            border-radius: 20px;
        }

        @media print {
            .actions-bar, .stats-bar { display: none; }
            body { background: white; padding: 0; }
            .ideas-grid { display: block; }
            .idea-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; margin-bottom: 20px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 מרכז ניהול נתונים: אילת 2035</h1>
        <p class="subtitle">ריכוז כל הרעיונות, הפתרונות, הפתקיות וההקלטות מהסדנה</p>
        
        <div class="actions-bar">
            <button class="btn btn-pdf" onclick="window.print()">📑 שמור סיכום כ-PDF</button>
            <button class="btn btn-excel" id="downloadExcel">📗 הורד קובץ Excel</button>
            <button class="btn btn-audio" id="downloadAllAudio">🎙️ הורד את כל ההקלטות</button>
        </div>

        <div class="stats-bar" id="stats">טוען נתונים מהענן...</div>
        <div class="ideas-grid" id="ideasGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcVlqfO_v4HGj7KC8-wPyC7EgWOmuyJ7A",
            authDomain: "eilat-service-2035.firebaseapp.com",
            projectId: "eilat-service-2035",
            storageBucket: "eilat-service-2035.firebasestorage.app",
            messagingSenderId: "12177419107",
            appId: "1:12177419107:web:70e353e46294af5ef30156"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentData = [];

        async function loadData() {
            const grid = document.getElementById('ideasGrid');
            const stats = document.getElementById('stats');
            
            try {
                const q = query(collection(db, "solutions"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = '';
                currentData = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // סינון הקלטות ישנות שאין להן באמת קובץ שמע
                    const isLegacyAudioText = typeof data.solution === 'string' && data.solution.includes("המשתמש הקליט הודעה קולית");
                    if (isLegacyAudioText) return; 

                    currentData.push(data);
                    
                    const card = document.createElement('div');
                    card.className = 'idea-card';
                    
                    let contentHTML = '';
                    if (data.type === 'image' && data.image) {
                        contentHTML = `<img src="${data.image}" class="idea-img" alt="פתקית שצולמה">`;
                    } else if (data.type === 'audio' && data.audio) {
                        contentHTML = `
                            <div class="idea-content" style="text-align:center; padding-top:10px;">
                                🎙️ <strong>הקלטה קולית מהמשתתף:</strong><br>
                                <audio controls class="audio-player">
                                    <source src="${data.audio}">
                                    הדפדפן שלך אינו תומך בנגן שמע.
                                </audio>
                            </div>`;
                    } else {
                        contentHTML = `<div class="idea-content">${data.solution || ''}</div>`;
                    }

                    card.innerHTML = `
                        <div class="idea-header">
                            👤 ${data.persona}<br>🏙️ ${data.scenario}
                        </div>
                        <div class="idea-body">
                            ${contentHTML}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                stats.innerText = `סה"כ נאספו ${currentData.length} תוצרים מהמשתתפים`;
            } catch (error) {
                console.error(error);
                stats.innerText = "שגיאה בתקשורת עם בסיס הנתונים.";
            }
        }

        // הורדת אקסל
        document.getElementById('downloadExcel').onclick = () => {
            if (currentData.length === 0) return alert("אין נתונים להורדה");

            let csvContent = "\uFEFF"; 
            csvContent += "תאריך,שם שולח,פרסונה,תרחיש,סוג,תוכן\n";

            currentData.forEach(item => {
                const date = item.timestamp ? item.timestamp.toDate().toLocaleString('he-IL') : '';
                const submitter = item.submitterName || 'אנונימי';
                const persona = item.persona || '';
                const scenario = item.scenario || '';
                
                let type = 'טקסט';
                if (item.type === 'image') type = 'צילום פתקית';
                if (item.type === 'audio') type = 'הקלטה קולית';

                let content = (item.solution || '').replace(/"/g, '""').replace(/\n/g, ' ');
                if (item.type === 'image') content = 'תמונה (ניתן לראות במסך הניהול)';
                if (item.type === 'audio') content = 'קובץ שמע (ניתן לשמוע במסך הניהול)';
                
                csvContent += `"${date}","${submitter}","${persona}","${scenario}","${type}","${content}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Eilat_2035_Results_${new Date().toLocaleDateString('he-IL').replace(/\//g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // הפונקציה להורדת כל ההקלטות
        document.getElementById('downloadAllAudio').onclick = async () => {
            const audioItems = currentData.filter(item => item.type === 'audio' && item.audio);
            
            if (audioItems.length === 0) {
                return alert("אין הקלטות להורדה במסד הנתונים כרגע.");
            }

            if (!confirm(`נמצאו ${audioItems.length} הקלטות קוליות. האם להוריד את כולן למחשב כעת?`)) return;

            for (let i = 0; i < audioItems.length; i++) {
                const item = audioItems[i];
                const link = document.createElement("a");
                link.href = item.audio;
                
                const submitter = item.submitterName ? item.submitterName.trim() : 'אנונימי';
                const personaName = item.persona ? item.persona.split(' ')[0] : 'פרסונה';
                
                const safeName = `${submitter}_${personaName}_${i+1}`.replace(/[\\/:*?"<>|]/g, '');
                
                link.download = `Recording_${safeName}.webm`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        };

        loadData();
    </script>
</body>
</html>
